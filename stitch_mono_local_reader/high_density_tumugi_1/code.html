<div class="w-full aspect-[2/3] bg-surface-container border border-outline-variant rounded-lg"></div>

<div class="flex justify-between items-start p-sm pb-0 border-b border-[#27272A]/50">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase px-xs pt-xs">Book Details</span>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-xs">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<!-- Content Area -->
<div class="flex flex-col p-sm gap-sm">
<!-- Cover & Title Block -->
<div class="flex gap-md items-start">
<!-- Cover Image Placeholder -->
<div class="w-[80px] shrink-0 aspect-[2/3] rounded-lg border border-[#27272A] overflow-hidden bg-surface-container">

</div>

<p class="font-body-md text-body-md text-on-surface-variant">by Richard Saul Wurman</p>
<!-- Chips -->
<div class="flex gap-xs mt-xs flex-wrap">
<span class="font-label-sm text-label-sm bg-surface-container px-xs py-[2px] rounded text-on-surface-variant border border-[#27272A]">EPUB</span>
<span class="font-label-sm text-label-sm bg-surface-container px-xs py-[2px] rounded text-on-surface-variant border border-[#27272A]">1.2 MB</span>
</div>
</div>
</div>
<!-- Metadata Table (Bento/Tight Layout) -->
<div class="bg-surface-container-low border border-[#27272A] rounded-lg p-sm grid grid-cols-2 gap-y-sm gap-x-md mt-xs">

</div>
</div>
</div>

<span class="font-body-md text-body-md text-primary">2 hours ago</span>
</div>
<div class="flex flex-col">

</div>
<div class="flex flex-col">

<span class="material-symbols-outlined text-[14px]">folder</span> Design
                    </span>
</div>
</div>

<!-- Primary Action -->
<button class="flex-1 bg-primary text-on-primary h-[32px] rounded-lg font-body-md text-body-md font-medium flex items-center justify-center gap-xs hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[16px] data-weight=fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Continue Reading

<button class="h-[32px] px-sm border border-[#27272A] text-on-surface-variant hover:text-error hover:border-error/50 rounded-lg font-body-md text-body-md flex items-center justify-center transition-colors group" title="Delete">
